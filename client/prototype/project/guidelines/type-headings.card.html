<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:#fff;}
  .row{display:flex;align-items:baseline;justify-content:space-between;gap:20px;padding:7px 0;border-bottom:1px solid var(--border-hairline);}
  .row:last-child{border-bottom:none;}
  .spec{font-size:11px;color:var(--text-secondary);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
</style></head>
<body>
<div class="row"><div style="font-size:36px;font-weight:300;letter-spacing:-1px;color:var(--color-navy)">Estimate summary</div><div class="spec">H1 · 300 · 36</div></div>
<div class="row"><div style="font-size:28px;font-weight:300;letter-spacing:-0.4px;color:var(--color-navy)">Line items</div><div class="spec">H2 · 300 · 28</div></div>
<div class="row"><div style="font-size:22px;font-weight:600;color:var(--color-navy)">Production costs</div><div class="spec">H3 · 600 · 22</div></div>
<div class="row"><div style="font-size:18px;font-weight:600;color:var(--color-navy)">Subhead label</div><div class="spec">SUB · 600 · 18</div></div>
</body></html>
