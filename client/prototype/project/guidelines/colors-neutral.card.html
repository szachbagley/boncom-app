<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Cool blue-gray ramp for text, borders, fills" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:#fff;}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
  .sw{border:1px solid var(--border-hairline);}
  .chip{height:72px;}
  .meta{padding:8px 10px;}
  .name{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--color-navy);}
  .hex{font-size:11px;color:var(--text-secondary);font-variant-numeric:tabular-nums;}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#F6F8FA;border-bottom:1px solid var(--border-hairline)"></div><div class="meta"><div class="name">50</div><div class="hex">#F6F8FA</div></div></div>
  <div class="sw"><div class="chip" style="background:#EDF1F4"></div><div class="meta"><div class="name">100</div><div class="hex">#EDF1F4</div></div></div>
  <div class="sw"><div class="chip" style="background:#DDE5EC"></div><div class="meta"><div class="name">200</div><div class="hex">#DDE5EC</div></div></div>
  <div class="sw"><div class="chip" style="background:#C7D3DD"></div><div class="meta"><div class="name">300</div><div class="hex">#C7D3DD</div></div></div>
  <div class="sw"><div class="chip" style="background:#BFCED9"></div><div class="meta"><div class="name">Muted</div><div class="hex">#BFCED9</div></div></div>
  <div class="sw"><div class="chip" style="background:#6B7A87"></div><div class="meta"><div class="name">500</div><div class="hex">#6B7A87</div></div></div>
</div>
</body></html>
