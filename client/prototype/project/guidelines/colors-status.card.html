<!-- @dsCard group="Colors" viewport="700x150" name="Status" subtitle="Muted green / red / orange — restrained register" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:#fff;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .sw{border:1px solid var(--border-hairline);}
  .chip{height:64px;display:flex;align-items:flex-end;padding:8px 10px;}
  .tag{font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;padding:2px 7px;background:#fff;}
  .meta{padding:8px 10px;}
  .name{font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--color-navy);}
  .hex{font-size:11px;color:var(--text-secondary);font-variant-numeric:tabular-nums;}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#3E8E6E"></div><div class="meta"><div class="name">Success</div><div class="hex">#3E8E6E · approved / paid</div></div></div>
  <div class="sw"><div class="chip" style="background:#C24634"></div><div class="meta"><div class="name">Danger</div><div class="hex">#C24634 · delete / error</div></div></div>
  <div class="sw"><div class="chip" style="background:#FC4F2C"></div><div class="meta"><div class="name">Warning</div><div class="hex">#FC4F2C · brand orange</div></div></div>
</div>
</body></html>
