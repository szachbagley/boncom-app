<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:#fff;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  .lbl{font-size:11px;font-weight:700;letter-spacing:2.3px;text-transform:uppercase;margin-bottom:8px;}
  .item{font-size:15px;line-height:1.5;color:var(--text-primary);}
  .muted{color:var(--text-secondary);}
</style></head>
<body>
<div class="grid">
  <div>
    <div class="lbl" style="color:var(--color-success)">We say</div>
    <div class="item">"Estimate sent to Riverbend Foundation."</div>
    <div class="item" style="margin-top:8px">"Two-day shoot, one revision round."</div>
    <div class="item" style="margin-top:8px">"Ready to send when you are."</div>
  </div>
  <div>
    <div class="lbl" style="color:var(--color-danger)">We don't say</div>
    <div class="item muted">"🎉 Woohoo! Your estimate is on its way!!"</div>
    <div class="item muted" style="margin-top:8px">"Supercharge your workflow today."</div>
    <div class="item muted" style="margin-top:8px">"Oops! Something went wrong."</div>
  </div>
</div>
</body></html>
