<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:24px;background:#fff;}
  .track{display:flex;align-items:flex-end;gap:16px;}
  .item{text-align:center;}
  .bar{background:var(--color-cyan);width:100%;}
  .n{font-size:11px;color:var(--text-secondary);margin-top:8px;letter-spacing:1px;}
  .cell{width:52px;}
</style></head>
<body>
<div class="track">
  <div class="item cell"><div class="bar" style="height:4px"></div><div class="n">1 · 4</div></div>
  <div class="item cell"><div class="bar" style="height:8px"></div><div class="n">2 · 8</div></div>
  <div class="item cell"><div class="bar" style="height:16px"></div><div class="n">4 · 16</div></div>
  <div class="item cell"><div class="bar" style="height:24px"></div><div class="n">5 · 24</div></div>
  <div class="item cell"><div class="bar" style="height:32px"></div><div class="n">6 · 32</div></div>
  <div class="item cell"><div class="bar" style="height:48px"></div><div class="n">7 · 48</div></div>
  <div class="item cell"><div class="bar" style="height:64px"></div><div class="n">8 · 64</div></div>
  <div class="item cell"><div class="bar" style="height:96px"></div><div class="n">9 · 96</div></div>
</div>
</body></html>
