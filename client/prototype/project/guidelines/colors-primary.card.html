<!-- @dsCard group="Colors" viewport="700x150" name="Primary & Brand" subtitle="White surface, near-black ink, navy, cyan, orange" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:#fff;}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .sw{border:1px solid var(--border-hairline);}
  .chip{height:72px;}
  .meta{padding:8px 10px;}
  .name{font-size:12px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--color-navy);}
  .hex{font-size:12px;color:var(--text-secondary);font-variant-numeric:tabular-nums;}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid var(--border-hairline)"></div><div class="meta"><div class="name">Surface</div><div class="hex">#FFFFFF</div></div></div>
  <div class="sw"><div class="chip" style="background:#292A2C"></div><div class="meta"><div class="name">Ink</div><div class="hex">#292A2C</div></div></div>
  <div class="sw"><div class="chip" style="background:#002042"></div><div class="meta"><div class="name">Navy</div><div class="hex">#002042</div></div></div>
  <div class="sw"><div class="chip" style="background:#65C6D9"></div><div class="meta"><div class="name">Cyan</div><div class="hex">#65C6D9</div></div></div>
  <div class="sw"><div class="chip" style="background:#FC4F2C"></div><div class="meta"><div class="name">Orange</div><div class="hex">#FC4F2C</div></div></div>
</div>
</body></html>
