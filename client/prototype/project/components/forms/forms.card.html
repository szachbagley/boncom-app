<!DOCTYPE html>

<head>

<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Textarea, Select, Checkbox } = window.BoncomEstimatesDesignSystem_54c230;
function Demo() {
  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, alignItems:'start' }}>
      <Input label="Client" placeholder="Organization name" defaultValue="Riverbend Foundation" />
      <Input label="Day rate" prefix="$" suffix="/day" placeholder="0.00" defaultValue="1,250" />
      <Select label="Status" options={[{value:'draft',label:'Draft'},{value:'sent',label:'Sent'},{value:'approved',label:'Approved'}]} />
      <Input label="Project code" error="Already in use" defaultValue="RVB-004" />
      <div style={{ gridColumn:'1 / -1' }}>
        <Textarea label="Scope notes" rows={3} defaultValue="Brand film, 90 seconds, two-day shoot on location." />
      </div>
      <div style={{ gridColumn:'1 / -1', display:'flex', gap:24 }}>
        <Checkbox label="Include 10% contingency" defaultChecked />
        <Checkbox label="Apply nonprofit rate" />
        <Checkbox label="Locked" disabled />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
