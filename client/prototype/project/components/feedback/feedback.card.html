<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { margin: 0; padding: 24px; background: #fff; } .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Badge, Button } = window.BoncomEstimatesDesignSystem_54c230;
function Demo() {
  const [open, setOpen] = React.useState(false);
  return (
    <div>
      <div className="row">
        <Badge status="draft" />
        <Badge status="sent" />
        <Badge status="approved" />
        <Badge status="rejected" />
        <Badge status="revised" />
      </div>
      <div className="row">
        <Badge tone="neutral">Internal</Badge>
        <Badge tone="navy">Nonprofit</Badge>
        <Badge tone="cyan">New</Badge>
        <Badge tone="warning">Expiring</Badge>
        <Badge tone="danger">Overdue</Badge>
      </div>
      <Button variant="secondary" onClick={() => setOpen(true)}>Open dialog</Button>
      <Dialog open={open} onClose={() => setOpen(false)} label="Confirm" title="Send this estimate?"
        footer={<>
          <Button variant="ghost" onClick={() => setOpen(false)}>Cancel</Button>
          <Button variant="accent" onClick={() => setOpen(false)}>Send</Button>
        </>}>
        <p style={{margin:0}}>The estimate will be emailed to Riverbend Foundation and marked as Sent.</p>
      </Dialog>
    </div>
  );
}
const { Dialog } = window.BoncomEstimatesDesignSystem_54c230;
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
