<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Boncom Estimates — Dashboard</title>
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.min.js"></script>
<script src="../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; min-height: 100%; background: var(--surface-page); }
  #root { min-height: 100vh; }
  a, a:hover { color: var(--text-link); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const NS = window.BoncomEstimatesDesignSystem_54c230;
const { Button, Badge, IconButton } = NS;

/* ---------- Lucide icon helper ---------- */
function Icon({ name, size = 18, color = 'currentColor', strokeWidth = 1.75, style }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      window.lucide.createIcons({ attrs: { width: size, height: size, stroke: color, 'stroke-width': strokeWidth } });
    }
  }, [name, size, color, strokeWidth]);
  return <span ref={ref} style={{ display: 'inline-flex', width: size, height: size, ...style }} />;
}

/* ---------- Fake data (dates drive the sort modes) ---------- */
const CLIENTS = [
  { name: 'Northwind Studios', estimates: [
    { id: 'e1', project: 'Spring Brand Refresh',        status: 'draft', created: '2026-06-30', updated: '2026-07-07' },
    { id: 'e2', project: 'Q3 Product Launch Video',     status: 'sent',  created: '2026-06-18', updated: '2026-07-05' },
    { id: 'e3', project: 'Holiday Campaign (Print)',    status: 'draft', created: '2026-07-02', updated: '2026-07-02' },
  ]},
  { name: 'Cascade Public Health', estimates: [
    { id: 'e4', project: 'Wellness Awareness Billboards', status: 'draft', created: '2026-06-22', updated: '2026-07-06' },
    { id: 'e5', project: 'Landing Page Design',           status: 'sent',  created: '2026-06-10', updated: '2026-06-28' },
  ]},
  { name: 'Meridian Museum', estimates: [
    { id: 'e6', project: 'Exhibit Promotion Spot',        status: 'sent',  created: '2026-05-30', updated: '2026-06-20' },
  ]},
];

const SORTS = [
  { value: 'updated', label: 'Date updated' },
  { value: 'created', label: 'Date created' },
  { value: 'status',  label: 'Status' },
  { value: 'alpha',   label: 'Alphabetical' },
];

/* ---------- Sorting / filtering ---------- */
function sortEstimates(list, mode) {
  const by = [...list];
  if (mode === 'updated') by.sort((a, b) => b.updated.localeCompare(a.updated));
  else if (mode === 'created') by.sort((a, b) => b.created.localeCompare(a.created));
  else if (mode === 'status') by.sort((a, b) => (a.status === b.status ? 0 : a.status === 'draft' ? -1 : 1));
  else if (mode === 'alpha') by.sort((a, b) => a.project.localeCompare(b.project));
  return by;
}
function groupRecency(g, mode) {
  const ests = g.estimates;
  if (!ests.length) return '';
  if (mode === 'created') return ests.reduce((m, e) => (e.created > m ? e.created : m), ests[0].created);
  return ests.reduce((m, e) => (e.updated > m ? e.updated : m), ests[0].updated);
}

/* ---------- Popover: "..." card menu ---------- */
function CardMenu({ open, onClose }) {
  React.useEffect(() => {
    if (!open) return;
    const h = () => onClose();
    window.addEventListener('click', h);
    return () => window.removeEventListener('click', h);
  }, [open, onClose]);
  if (!open) return null;
  const items = [
    { label: 'View estimate', icon: 'eye' },
    { label: 'Edit estimate', icon: 'pencil' },
    { label: 'Delete estimate', icon: 'trash-2', danger: true },
  ];
  return (
    <div onClick={(e) => e.stopPropagation()} style={{
      position: 'absolute', top: 44, right: 12, zIndex: 30, minWidth: 178,
      background: '#fff', border: '1px solid var(--border-strong)', borderTop: '3px solid var(--color-cyan)',
    }}>
      {items.map((it, i) => (
        <MenuItem key={i} {...it} onClick={onClose} last={i === items.length - 1} />
      ))}
    </div>
  );
}
function MenuItem({ label, icon, danger, onClick, last }) {
  const [h, setH] = React.useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{
        display: 'flex', alignItems: 'center', gap: 10, width: '100%', textAlign: 'left',
        padding: '11px 14px', border: 'none', borderBottom: last ? 'none' : '1px solid var(--border-hairline)',
        background: h ? (danger ? 'var(--color-danger-bg)' : 'var(--surface-subtle)') : '#fff',
        cursor: 'pointer', fontFamily: 'var(--font-sans)', fontSize: 14,
        color: danger ? 'var(--color-danger)' : 'var(--text-primary)',
      }}>
      <Icon name={icon} size={15} color={danger ? '#C24634' : '#6B7A87'} /> {label}
    </button>
  );
}

/* ---------- Dropdown control (sort / filter) ---------- */
function Dropdown({ icon, label, active, children, align = 'right' }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    window.addEventListener('click', h);
    return () => window.removeEventListener('click', h);
  }, []);
  const [hover, setHover] = React.useState(false);
  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <button onClick={() => setOpen(o => !o)} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
        style={{
          display: 'inline-flex', alignItems: 'center', gap: 8, height: 44, padding: '0 14px',
          background: (open || hover) ? 'var(--surface-hover)' : 'transparent',
          border: '1px solid var(--border-strong)', cursor: 'pointer',
          fontFamily: 'var(--font-sans)', fontSize: 13, fontWeight: 700, letterSpacing: '2.3px',
          textTransform: 'uppercase', color: 'var(--color-navy)',
        }}>
        <Icon name={icon} size={16} color="#002042" />
        {label}
        <Icon name="chevron-down" size={14} color="#6B7A87" />
      </button>
      {open && (
        <div onClick={(e) => e.stopPropagation()} style={{
          position: 'absolute', top: 48, [align]: 0, zIndex: 30, minWidth: 220,
          background: '#fff', border: '1px solid var(--border-strong)', borderTop: '3px solid var(--color-cyan)',
        }}>
          {children}
        </div>
      )}
    </div>
  );
}
function RadioRow({ label, checked, onClick }) {
  const [h, setH] = React.useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', width: '100%',
        padding: '11px 14px', border: 'none', borderBottom: '1px solid var(--border-hairline)',
        background: h ? 'var(--surface-subtle)' : '#fff', cursor: 'pointer',
        fontFamily: 'var(--font-sans)', fontSize: 14, color: 'var(--text-primary)' }}>
      {label}
      {checked && <Icon name="check" size={15} color="#65C6D9" />}
    </button>
  );
}
function CheckRow({ label, checked, onClick }) {
  const [h, setH] = React.useState(false);
  return (
    <button onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%',
        padding: '10px 14px', border: 'none', background: h ? 'var(--surface-subtle)' : '#fff',
        cursor: 'pointer', fontFamily: 'var(--font-sans)', fontSize: 14, color: 'var(--text-primary)' }}>
      <span style={{ width: 18, height: 18, flexShrink: 0, border: `1px solid ${checked ? 'var(--color-cyan)' : 'var(--border-strong)'}`,
        background: checked ? 'var(--color-cyan)' : '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
        {checked && <Icon name="check" size={12} color="#002042" strokeWidth={3} />}
      </span>
      {label}
    </button>
  );
}
function GroupLabel({ children }) {
  return <div style={{ padding: '10px 14px 6px', fontSize: 11, fontWeight: 700, letterSpacing: '2px',
    textTransform: 'uppercase', color: 'var(--text-secondary)' }}>{children}</div>;
}

/* ---------- Estimate card ---------- */
function EstimateCard({ est }) {
  const [hover, setHover] = React.useState(false);
  const [menu, setMenu] = React.useState(false);
  return (
    <div
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ position: 'relative', display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
        minHeight: 132, padding: 22, cursor: 'pointer', background: '#fff',
        border: `1px solid ${hover ? 'var(--border-strong)' : 'var(--border-hairline)'}`,
        transition: 'border-color 140ms cubic-bezier(0.4,0,0.2,1)' }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 10 }}>
        <div style={{ fontSize: 17, fontWeight: 600, lineHeight: 1.3, color: 'var(--color-navy)', textWrap: 'pretty' }}>
          {est.project}
        </div>
        <div style={{ flexShrink: 0, marginRight: -8, marginTop: -6 }} onClick={(e) => { e.stopPropagation(); setMenu(m => !m); }}>
          <IconButton label="Estimate actions" variant="ghost" size="sm"><Icon name="more-horizontal" size={18} color="#6B7A87" /></IconButton>
        </div>
      </div>
      <div style={{ marginTop: 20 }}>
        <Badge status={est.status} />
      </div>
      <CardMenu open={menu} onClose={() => setMenu(false)} />
    </div>
  );
}

/* ---------- Client group ---------- */
function ClientGroup({ group }) {
  const [hover, setHover] = React.useState(false);
  return (
    <section style={{ marginBottom: 44 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 18 }}>
        <h2 style={{ margin: 0, fontSize: 21, fontWeight: 700, letterSpacing: '-0.3px', color: 'var(--color-navy)' }}>
          {group.name}
        </h2>
        <div onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}>
          <IconButton label={`Add estimate for ${group.name}`} variant={hover ? 'accent' : 'secondary'} size="sm">
            <Icon name="plus" size={16} color="#002042" />
          </IconButton>
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(258px, 1fr))', gap: 16 }}>
        {group.estimates.map((e) => <EstimateCard key={e.id} est={e} />)}
      </div>
    </section>
  );
}

/* ---------- App ---------- */
function Dashboard() {
  const [sort, setSort] = React.useState('updated');
  const [statusFilter, setStatusFilter] = React.useState({ draft: true, sent: true });
  const [clientFilter, setClientFilter] = React.useState({}); // empty = all

  const anyClient = Object.values(clientFilter).some(Boolean);

  const groups = CLIENTS
    .map(g => ({
      ...g,
      estimates: sortEstimates(
        g.estimates.filter(e => statusFilter[e.status]),
        sort
      ),
    }))
    .filter(g => g.estimates.length > 0)                         // clients with no estimates not shown
    .filter(g => !anyClient || clientFilter[g.name]);

  if (sort === 'alpha') groups.sort((a, b) => a.name.localeCompare(b.name));
  else groups.sort((a, b) => groupRecency(b, sort).localeCompare(groupRecency(a, sort)));

  const sortLabel = SORTS.find(s => s.value === sort).label;
  const filtered = !statusFilter.draft || !statusFilter.sent || anyClient;

  return (
    <div>
      {/* Header */}
      <header style={{ borderBottom: '1px solid var(--border-hairline)', padding: '0 48px' }}>
        <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', alignItems: 'center',
          justifyContent: 'space-between', gap: 24, height: 96 }}>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 9 }}>
            <span style={{ fontSize: 30, fontWeight: 700, letterSpacing: '-0.6px', color: 'var(--color-navy)' }}>Boncom</span>
            <span style={{ fontSize: 30, fontWeight: 300, letterSpacing: '-0.6px', color: 'var(--color-ink)' }}>Estimates</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <Button variant="primary" style={{ whiteSpace: 'nowrap' }} iconLeft={<Icon name="plus" size={16} color="#fff" />}>Add estimate</Button>
            <Dropdown icon="arrow-up-down" label="Sort">
              <GroupLabel>Sort by</GroupLabel>
              {SORTS.map(s => (
                <RadioRow key={s.value} label={s.label} checked={sort === s.value} onClick={() => setSort(s.value)} />
              ))}
            </Dropdown>
            <Dropdown icon="filter" label="Filter">
              <GroupLabel>Status</GroupLabel>
              <CheckRow label="Draft" checked={statusFilter.draft} onClick={() => setStatusFilter(f => ({ ...f, draft: !f.draft }))} />
              <CheckRow label="Sent"  checked={statusFilter.sent}  onClick={() => setStatusFilter(f => ({ ...f, sent: !f.sent }))} />
              <div style={{ borderTop: '1px solid var(--border-hairline)' }} />
              <GroupLabel>Client</GroupLabel>
              {CLIENTS.map(c => (
                <CheckRow key={c.name} label={c.name} checked={!!clientFilter[c.name]}
                  onClick={() => setClientFilter(f => ({ ...f, [c.name]: !f[c.name] }))} />
              ))}
            </Dropdown>
          </div>
        </div>
      </header>

      {/* Body */}
      <main style={{ maxWidth: 1200, margin: '0 auto', padding: '40px 48px 80px' }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 14, marginBottom: 34 }}>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: '3px', textTransform: 'uppercase', color: 'var(--text-secondary)' }}>
            Estimates
          </div>
          <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>
            Sorted by {sortLabel.toLowerCase()}{filtered ? ' · filtered' : ''}
          </div>
        </div>

        {groups.length === 0 ? (
          <div style={{ padding: '60px 0', fontSize: 18, color: 'var(--text-secondary)' }}>
            No estimates match these filters.
          </div>
        ) : (
          groups.map(g => <ClientGroup key={g.name} group={g} />)
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
